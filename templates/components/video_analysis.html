<!-- ================= PHÂN TÍCH VIDEO ================= -->

<section class="card">

    <h2>🎬 Phân tích Video lưu trữ (Offline Analysis)</h2>

    <p class="description">

        Tải video bài giảng lên để AI phân tích cảm xúc và đánh giá
        mức độ tập trung trong toàn bộ thời lượng video.

    </p>

    <div style="margin-bottom: 15px;">
        <label for="video-subject" style="display: block; margin-bottom: 5px; color: var(--text-light);">📚 Chọn môn học:</label>
        <input type="text" id="video-subject" list="subject-list" placeholder="Ví dụ: Toán học, Ngữ văn..." 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-dark); color: var(--text-light);">
        <datalist id="subject-list">
            <option value="Toán học">
            <option value="Ngữ văn">
            <option value="Tiếng Anh">
            <option value="Vật lý">
            <option value="Hóa học">
            <option value="Sinh học">
            <option value="Lịch sử">
            <option value="Địa lý">
        </datalist>
    </div>

    <input
        type="file"
        id="video-upload"
        accept="video/*"
        style="margin-bottom: 15px; display: block;">

    <div class="button-group">

        <button id="uploadBtn">

            📂 Phân tích Video

        </button>

    </div>

    <div id="upload-status">

        Chưa có video được tải lên.

    </div>

    <hr>

    <h3>💾 Quản lý dữ liệu</h3>

    <div class="button-group">

        <button id="exportBtn">

            📊 Xuất Excel

        </button>

        <button id="resetBtn">

            🔄 Đặt lại thống kê

        </button>

        <button id="summaryBtn">

            📈 Tổng quan

        </button>

    </div>

    <div class="summary-box">

        <p>

            Tổng số lần AI phân tích:

            <strong id="total-detect">

                0

            </strong>

        </p>

    </div>

</section>
